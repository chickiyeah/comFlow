spring.application.name=campusflow

# DB (값은 .env에서 로드)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI - Claude (primary)
ai.claude.api-key=${CLAUDE_API_KEY}
ai.claude.model=${CLAUDE_MODEL:claude-opus-4-7}

# AI - OpenAI (backup)
ai.openai.api-key=${OPENAI_API_KEY}
ai.openai.model=${OPENAI_MODEL:gpt-4o}

# ChromaDB
chroma.host=${CHROMA_HOST:localhost}
chroma.port=${CHROMA_PORT:8000}

# 파일 업로드
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 서버
server.port=8080

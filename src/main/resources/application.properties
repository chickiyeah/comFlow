spring.application.name=campusflow

# DB (값은 .env에서 로드)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI - Claude (primary)
ai.claude.api-key=${CLAUDE_API_KEY}
ai.claude.model=${CLAUDE_MODEL:claude-opus-4-7}

# AI - OpenAI (backup)
ai.openai.api-key=${OPENAI_API_KEY}
ai.openai.model=${OPENAI_MODEL:gpt-4o}

# ChromaDB
chroma.host=${CHROMA_HOST:localhost}
chroma.port=${CHROMA_PORT:8000}

# 파일 업로드
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 이메일 (내부 메일 서버 10.8.0.17, SPF+DKIM+DMARC 설정 완료)
spring.mail.host=${MAIL_HOST:10.8.0.17}
spring.mail.port=${MAIL_PORT:25}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
mail.from=${MAIL_FROM:campusflow@decodns.org}

# ── AI 폴백 체인 ─────────────────────────────────────────────
# 1순위: jvision.ai (전주비전대 자체 vLLM)
jvision.ai.token=${JVISION_AI_TOKEN:}

# 2순위: Ollama 로컬 서버 (내부망, round-robin)
ollama.servers=${OLLAMA_SERVERS:http://10.8.0.30:11434,http://10.8.0.31:11434,http://10.8.0.32:11434,http://10.8.0.33:11434,http://10.8.0.34:11434}

# 3순위: Google Gemini (최후 폴백)
gemini.api.key=${GEMINI_API_KEY:}

# 외부 API (취업 정보 - data.go.kr)
worknet.api.key=${WORKNET_API_KEY:}
qnet.api.key=${QNET_API_KEY:}
blind.recruit.api.key=${BLIND_RECRUIT_API_KEY:}
saramin.api.key=${SARAMIN_API_KEY:}

# 학교 포털 연동 서버 (10.8.0.14 FastAPI)
intranet.sync.url=${INTRANET_SYNC_URL:http://10.8.0.14:8000}

# 서버
server.port=8080

# ── HikariCP 연결 풀 최적화 ──────────────────────────────────
spring.datasource.hikari.pool-name=CampusFlowPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# ── GZIP 응답 압축 ────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# ── Tomcat 스레드 ─────────────────────────────────────────────
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=8192

# ── JPA 최적화 ────────────────────────────────────────────────
spring.jpa.open-in-view=false

# ── Jackson — null 필드 직렬화 제외 (응답 페이로드 감소) ──────
spring.jackson.default-property-inclusion=non_null

# ── 로그 레벨 최적화 (운영 시 불필요한 SQL 로그 제거) ─────────
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

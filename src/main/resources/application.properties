spring.application.name=campusflow

# DB (값은 .env에서 로드)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI - Claude (primary)
ai.claude.api-key=${CLAUDE_API_KEY}
ai.claude.model=${CLAUDE_MODEL:claude-opus-4-7}

# AI - OpenAI (backup)
ai.openai.api-key=${OPENAI_API_KEY}
ai.openai.model=${OPENAI_MODEL:gpt-4o}

# ChromaDB
chroma.host=${CHROMA_HOST:localhost}
chroma.port=${CHROMA_PORT:8000}

# 파일 업로드
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 이메일 (내부 메일 서버 10.8.0.17, SPF+DKIM+DMARC 설정 완료)
spring.mail.host=${MAIL_HOST:10.8.0.17}
spring.mail.port=${MAIL_PORT:25}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
mail.from=${MAIL_FROM:campusflow@decodns.org}

# 외부 API (취업 정보)
worknet.api.key=${WORKNET_API_KEY:}
qnet.api.key=${QNET_API_KEY:}

# 서버
server.port=8080
